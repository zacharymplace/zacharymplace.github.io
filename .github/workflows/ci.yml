name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Baseline validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository text diffs
        run: git diff --check

      - name: Validate package metadata when present
        run: |
          if [ -f package.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json OK')"
          else
            echo "No package.json present; skipping package metadata validation."
          fi

      - name: Validate shell scripts when present
        run: |
          find . -name "*.sh" -type f -print0 | xargs -0 -r -n1 bash -n
